<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Doodles Magazine</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f0f3dc;
      font-family: Myfont-Regular;
    }

  
    .flipbook {
      width: 700px;
      height: 500px;
    }

    .flipbook > div {
      width: 700px;
      height: 500px;
      position: relative;
      overflow: hidden;
      background: white;
      backface-visibility: hidden;
    }


    .flipbook img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .hard {
      background: #AFE1AF;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-size: 28px;
      font-weight: bold;
      color: #222;
    }

    .hard small {
      font-size: 14px;
      margin-top: 10px;
      font-weight: normal;
    }

  </style>
</head>

<body>

<div class="flipbook">

  <div class="hard">
    Doodles Magazine
    <small>Cecilia</small>
  </div>
  <div>
    <img src="images/bee.png">
    <div class="caption">bee?</div>
  </div>

  <div>
    <img src="images/Screenshot_22-4-2026_94811_.jpeg">
    <div class="caption">butterfly dancing</div>
  </div>

  <div>
    <img src="images/Screenshot_22-4-2026_94926_.jpeg">
    <div class="caption">dream vacation</div>
  </div>

  <div>
    <img src="images/Screenshot_22-4-2026_95047_.jpeg">
    <div class="caption">ocean sideway</div>
  </div>

  <div>
    <img src="images/Screenshot_22-4-2026_9506_.jpeg">
    <div class="caption">blossom</div>
  </div>

  <div>
    <img src="images/Screenshot_22-4-2026_9511_.jpeg">
    <div class="caption">bamboo</div>
  </div>

  <div>
    <img src="images/Screenshot_22-4-2026_95124_.jpeg">
    <div class="caption">at sea</div>
  </div>

  <div>
    <img src="images/Screenshot_22-4-2026_95142_.jpeg">
    <div class="caption">why does everything die</div>
  </div>

  <div class="hard">
    thank you
    <small>yours truly, Cecilia</small>
  </div>

</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="turn.js"></script>

<script>
  $(".flipbook").turn({
  width: 800, 
  height: 500,
  autoCenter: true,
  display: "single",
});
</script>

</body>
</html>
