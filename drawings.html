<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Doodles Magazine</title>

  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #f5f5f5;
      margin: 0;
      font-family: Arial, sans-serif;
    }

    .flipbook {
      width: 400px;
      height: 300px;
    }

    .flipbook > div {
      width: 400px;
      height: 300px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: white;
      border: 1px solid #ddd;
      overflow: hidden;
    }

    .flipbook img {
      max-width: 80%;
      max-height: 70%;
      object-fit: contain;
    }

    small {
      margin-top: 10px;
      color: #555;
    }

    .hard {
      font-weight: bold;
      font-size: 20px;
      background: #eaeaea;
    }
  </style>
</head>

<body>

<div class="flipbook">

  <div class="hard">
    Doodles Magazine<br>
    <small>Cecilia</small>
  </div>

  <div>
    <img src="images/bee.png">
    <small>bee?</small>
  </div>

  <div>
    <img src="images/Screenshot_22-4-2026_94811_.jpeg">
    <small>butterfly dancing</small>
  </div>

  <div>
    <img src="images/Screenshot_22-4-2026_94926_.jpeg">
    <small>dream vacation</small>
  </div>

  <div>
    <img src="images/Screenshot_22-4-2026_95047_.jpeg">
    <small>ocean sideway</small>
  </div>

  <div>
    <img src="images/Screenshot_22-4-2026_9506_.jpeg">
    <small>blossom</small>
  </div>

  <div>
    <img src="images/Screenshot_22-4-2026_9511_.jpeg">
    <small>bamboo</small>
  </div>

  <div>
    <img src="images/Screenshot_22-4-2026_95124_.jpeg">
    <small>at sea</small>
  </div>

  <div>
    <img src="images/Screenshot_22-4-2026_95142_.jpeg">
    <small>why does everything die</small>
  </div>

  <div class="hard">
    thank u<br>
    <small>yours truly, Cecilia</small>
  </div>

</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="turn.js"></script>

<script>
$(".flipbook").turn({
  width: 800,
  height: 600,
  autoCenter: true,
  gradients: true,
  acceleration: true
});
</script>

</body>
</html>
