<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Doodles Magazine</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f5f5f5;
      font-family: Myfont-Regular;
    }

  
    .flipbook {
      width: 900px;
      height: 650px;
    }

    .flipbook > div {
      width: 900px;
      height: 650px;
      position: relative;
      overflow: hidden;
      background: black;
    }


    .flipbook img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .caption {
      position: absolute;
      bottom: 20px;
      left: 20px;
      right: 20px;
      color: white;
      font-size: 16px;
      background: rgba(0, 0, 0, 0.4);
      padding: 10px 14px;
      border-radius: 8px;
    }

    .hard {
      background: #AFE1AF;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-size: 28px;
      font-weight: bold;
      color: #222;
    }

    .hard small {
      font-size: 14px;
      margin-top: 10px;
      font-weight: normal;
    }

  </style>
</head>

<body>

<div class="flipbook">

  <div class="hard">
    Doodles Magazine
    <small>Cecilia</small>
  </div>
<div></div>
  <div>
    <img src="images/bee.png">
    <div class="caption">bee?</div>
  </div>

  <div>
    <img src="images/Screenshot_22-4-2026_94811_.jpeg">
    <div class="caption">butterfly dancing</div>
  </div>

  <div>
    <img src="images/Screenshot_22-4-2026_94926_.jpeg">
    <div class="caption">dream vacation</div>
  </div>

  <div>
    <img src="images/Screenshot_22-4-2026_95047_.jpeg">
    <div class="caption">ocean sideway</div>
  </div>

  <div>
    <img src="images/Screenshot_22-4-2026_9506_.jpeg">
    <div class="caption">blossom</div>
  </div>

  <div>
    <img src="images/Screenshot_22-4-2026_9511_.jpeg">
    <div class="caption">bamboo</div>
  </div>

  <div>
    <img src="images/Screenshot_22-4-2026_95124_.jpeg">
    <div class="caption">at sea</div>
  </div>

  <div>
    <img src="images/Screenshot_22-4-2026_95142_.jpeg">
    <div class="caption">why does everything die</div>
  </div>

  <div class="hard">
    thank you
    <small>yours truly, Cecilia</small>
  </div>

</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="turn.js"></script>

<script>
  $(".flipbook").turn({
    width: 900,
    height: 650,
    autoCenter: true,
    gradients: true,
    acceleration: true
  });
</script>

</body>
</html>
