<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Doodles Magazine</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#e9edd6;
  font-family: "Courier New", cursive;
  overflow:hidden;
}



.book{
  position:relative;
  width:800px;
  height:500px;
  perspective:2000px;
}



.page{
  position:absolute;
  width:400px;
  height:500px;
  right:0;
  transform-origin:left;
  transition:transform 1s;
  transform-style:preserve-3d;
  cursor:pointer;
}


.front,
.back{
  position:absolute;
  width:100%;
  height:100%;
  backface-visibility:hidden;
  overflow:hidden;
  background:#fffef8;
  border:1px solid #ddd;
  box-shadow:
    0 0 10px rgba(0,0,0,0.08);
}



.front{
  display:flex;
  justify-content:center;
  align-items:center;
}


.back{
  transform:rotateY(180deg);
}



.page img{
  width:100%;
  height:100%;
  object-fit:cover;
}


.caption{
  position:absolute;
  bottom:20px;
  left:20px;
  background:rgba(255,255,255,0.8);
  padding:8px 14px;
  font-size:18px;
  transform:rotate(-2deg);
}



.cover{
  background:#AFE1AF;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  font-size:40px;
  font-weight:bold;
}


small{
  margin-top:10px;
  font-size:18px;
  font-weight:normal;
}

.flipped{
  transform:rotateY(-180deg);
}



.book::before{
  content:"";
  position:absolute;
  left:50%;
  top:0;
  width:6px;
  height:100%;
  background:#d8dcc8;
  transform:translateX(-50%);
  z-index:100;
}

</style>
</head>

<body>

<div class="book">


  <div class="page" style="z-index:5;">
    <div class="front cover">
      Doodles Magazine
      <small>Cecilia</small>
    </div>

    <div class="back">
      <img src="images/bee.png">
      <div class="caption">bee?</div>
    </div>
  </div>


  <div class="page" style="z-index:4;">
    <div class="front">
      <img src="images/Screenshot_22-4-2026_94811_.jpeg">
      <div class="caption">butterfly dancing</div>
    </div>

    <div class="back">
      <img src="images/Screenshot_22-4-2026_94926_.jpeg">
      <div class="caption">dream vacation</div>
    </div>
  </div>



  <div class="page" style="z-index:3;">
    <div class="front">
      <img src="images/Screenshot_22-4-2026_95047_.jpeg">
      <div class="caption">ocean sideway</div>
    </div>

    <div class="back">
      <img src="images/Screenshot_22-4-2026_9506_.jpeg">
      <div class="caption">blossom</div>
    </div>
  </div>



  <div class="page" style="z-index:2;">
    <div class="front">
      <img src="images/Screenshot_22-4-2026_9511_.jpeg">
      <div class="caption">bamboo</div>
    </div>

    <div class="back">
      <img src="images/Screenshot_22-4-2026_95124_.jpeg">
      <div class="caption">at sea</div>
    </div>
  </div>

  <!-- BACK COVER -->

  <div class="page" style="z-index:1;">
    <div class="front">
      <img src="images/Screenshot_22-4-2026_95142_.jpeg">
      <div class="caption">why does everything die</div>
    </div>

    <div class="back cover">
      thank you
      <small>yours truly, Cecilia</small>
    </div>
  </div>

</div>

<script>

const pages = document.querySelectorAll(".page");

pages.forEach((page, index) => {

  page.addEventListener("click", () => {

    page.classList.toggle("flipped");

  });

});

</script>

</body>
</html>
