<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Doodles Magazine</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  background: #f0f3dc;
  font-family: Arial, sans-serif;

  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;

  min-height: 100vh;
}


.book {
  width: 800px;
  height: 500px;
  position: relative;
  overflow: hidden;
  border-radius: 10px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  background: white;
}


.page {
  position: absolute;
  width: 100%;
  height: 100%;
  display: none;
}

.page.active {
  display: block;
}


.page img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}


.cover {
  background: #AFE1AF;
  color: #222;

  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;

  font-size: 40px;
  font-weight: bold;
}

.cover small {
  margin-top: 10px;
  font-size: 18px;
  font-weight: normal;
}

.caption {
  position: absolute;
  bottom: 0;
  width: 100%;
  padding: 15px;

  background: rgba(0,0,0,0.5);
  color: white;

  text-align: center;
  font-size: 20px;
}


.controls {
  margin-top: 20px;
}

button {
  padding: 12px 24px;
  margin: 0 10px;

  border: none;
  border-radius: 8px;

  background: #AFE1AF;
  cursor: pointer;
  font-size: 16px;
}

button:hover {
  opacity: 0.8;
}


a {
  margin-top: 20px;
  text-decoration: none;
  color: #333;
}
</style>
</head>

<body>

<div class="book">


  <div class="page active cover">
    Doodles Magazine
    <small>Cecilia</small>
  </div>


  <div class="page">
    <img src="images/bee.png">
    <div class="caption">bee?</div>
  </div>


  <div class="page">
    <img src="images/Screenshot_22-4-2026_94811_.jpeg">
    <div class="caption">butterfly dancing</div>
  </div>

 
  <div class="page">
    <img src="images/Screenshot_22-4-2026_94926_.jpeg">
    <div class="caption">dream vacation</div>
  </div>


  <div class="page">
    <img src="images/Screenshot_22-4-2026_95047_.jpeg">
    <div class="caption">ocean sideway</div>
  </div>

  <div class="page cover">
    thank you
    <small>yours truly, Cecilia</small>
  </div>

</div>

<div class="controls">
  <button onclick="prevPage()">← Prev</button>
  <button onclick="nextPage()">Next →</button>
</div>

<a href="index.html">← Back to Home</a>

<script>
const pages = document.querySelectorAll(".page");
let currentPage = 0;

function showPage(index) {
  pages.forEach(page => page.classList.remove("active"));
  pages[index].classList.add("active");
}

function nextPage() {
  if (currentPage < pages.length - 1) {
    currentPage++;
    showPage(currentPage);
  }
}

function prevPage() {
  if (currentPage > 0) {
    currentPage--;
    showPage(currentPage);
  }
}
</script>

</body>
</html>
